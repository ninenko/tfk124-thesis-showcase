<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TFK-124 — Выпускные работы · Заманбап Мугалим / IUCA</title>
<link rel="icon" href="assets/tfk-seal.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="masthead">
  <div class="seals">
    <img src="assets/iuca-seal-black.png" alt="Печать МУЦА / IUCA">
    <img src="assets/tfk-seal.svg" alt="Печать Заманбап Мугалим / Teach for Kyrgyzstan">
  </div>
  <p class="hero-kicker">Выпуск&nbsp;·&nbsp;2026</p>
  <h1 class="hero-title" id="heroTitle">Педагогическая деятельность в условиях изменений</h1>
  <p class="hero-sub" id="heroSub"></p>
</header>

<div class="wrap">
  <div class="rule"></div>

  <div class="toggle" role="tablist" aria-label="Способ просмотра">
    <button role="tab" data-view="cloud" aria-selected="true">Облако тем</button>
    <button role="tab" data-view="facets" aria-selected="false">По теме</button>
    <button role="tab" data-view="names" aria-selected="false">По имени</button>
  </div>

  <section class="panel active" id="panel-cloud" aria-label="Облако тем">
    <div class="cloud" id="cloud"></div>
  </section>
  <section class="panel" id="panel-facets" aria-label="Темы">
    <div class="facets" id="facets"></div>
  </section>
  <section class="panel" id="panel-names" aria-label="По имени">
    <div class="names" id="names"></div>
  </section>

  <div class="filterbar" id="filterbar">
    <span class="ftxt" id="filtertext"></span>
    <button id="clearFilter">Показать все работы</button>
  </div>

  <p class="count" id="count"></p>
  <div class="cards" id="cards"></div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <button class="close" id="closeDetail" aria-label="Закрыть">&times;</button>
  <div class="detail" id="detail"></div>
</div>

<script src="data/data.js"></script>
<script src="app.js"></script>
</body>
</html>
